apiVersion: v1
kind: Namespace
metadata:
  name: happy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: happy
data:
  user.yaml: |
    Name: user-api
    Host: 0.0.0.0
    Port: 8001
    MySQL:
      Host: mysql-service
      Port: 3306
      User: root
      Password: root123456
      DBName: happy
      MaxOpenConns: 100
      MaxIdleConns: 10
    Redis:
      - Host: redis-service:6379
        Pass: redis123456
    Auth:
      AccessSecret: happy-secret-key-2024
      AccessExpire: 86400
    Tenant:
      Enabled: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: happy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: happy/user-service:latest
        ports:
        - containerPort: 8001
        env:
        - name: TZ
          value: Asia/Shanghai
        volumeMounts:
        - name: config
          mountPath: /app/etc
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: backend-config
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: happy
spec:
  selector:
    app: user-service
  ports:
  - port: 8001
    targetPort: 8001
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: content-service
  namespace: happy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: content-service
  template:
    metadata:
      labels:
        app: content-service
    spec:
      containers:
      - name: content-service
        image: happy/content-service:latest
        ports:
        - containerPort: 8002
        env:
        - name: TZ
          value: Asia/Shanghai
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: content-service
  namespace: happy
spec:
  selector:
    app: content-service
  ports:
  - port: 8002
    targetPort: 8002
  type: ClusterIP
