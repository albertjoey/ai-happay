<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>API测试</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f5f5f5; }
        .success { color: green; }
        .error { color: red; }
        pre { background: white; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>发现页API测试</h1>
    <button onclick="testAPI()">测试API</button>
    <div id="result"></div>
    
    <script>
        async function testAPI() {
            const result = document.getElementById('result');
            result.innerHTML = '<p>正在测试...</p>';
            
            try {
                result.innerHTML += '<h3>测试: Fetch API</h3>';
                const response = await fetch('http://localhost:4005/api/v1/discover');
                result.innerHTML += `<p>状态码: ${response.status}</p>`;
                const data = await response.json();
                result.innerHTML += `<p class="success">✅ 成功获取 ${data.modules.length} 个模块</p>`;
                result.innerHTML += '<pre>' + JSON.stringify(data, null, 2).substring(0, 500) + '...</pre>';
                
            } catch (error) {
                result.innerHTML += `<p class="error">❌ 错误: ${error.message}</p>`;
                result.innerHTML += '<pre>' + error.stack + '</pre>';
            }
        }
        
        testAPI();
    </script>
</body>
</html>
